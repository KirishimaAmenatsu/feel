name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: 发布新版本
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 提取版本号
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: 验证 feel 脚本版本与 tag 一致
        run: |
          SCRIPT_VER=$(grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' feel | head -1)
          TAG_VER="${{ steps.version.outputs.version }}"
          if [ "$SCRIPT_VER" != "$TAG_VER" ]; then
            echo "❌ feel 脚本版本 ($SCRIPT_VER) 与 tag ($TAG_VER) 不一致"
            exit 1
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "feel ${{ steps.version.outputs.tag }}"
          generate_release_notes: true

      - name: 计算 release tarball sha256
        id: sha256
        run: |
          # 等待 GitHub 生成 tarball
          sleep 5
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          curl -sL "$TARBALL_URL" -o /tmp/feel.tar.gz
          HASH=$(sha256sum /tmp/feel.tar.gz | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "tarball_sha256: $HASH"

      - name: 更新 Formula sha256
        run: |
          HASH="${{ steps.sha256.outputs.hash }}"
          sed -i "s/sha256 \".*\"/sha256 \"$HASH\"/" Formula/feel.rb

      - name: 提交 Formula 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/feel.rb
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "无需提交"
          else
            git commit -m "chore: update Formula sha256 for ${{ steps.version.outputs.tag }}"
            git push
          fi
